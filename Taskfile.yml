version: "3"

vars:
  RUST_CRATES:
    sh: |
      find rust -mindepth 1 -maxdepth 1 -name 'phenotype-mcp-*' -type d \
        -exec test -f '{}/Cargo.toml' ';' -print \
        | grep -v '/phenotype-mcp-asset$' \
        | tr '\n' ' ' || true
  PYTHON_ROOT: python/pheno-mcp
  TS_ROOT: typescript
  GO_MODULES:
    sh: |
      find . -path './.git' -prune -o \
        -path './rust/mcp-forge/integrationtests' -prune -o \
        -name go.mod -type f -print \
        | sed 's#/go.mod$##; s#^\./##' \
        | tr '\n' ' ' || true
  GO_CMD:
    sh: |
      if [ -x /opt/homebrew/bin/go ]; then
        echo /opt/homebrew/bin/go
      else
        command -v go
      fi

tasks:
  default:
    desc: Run the default workspace build
    cmds:
      - task: build

  build:
    desc: Build detected language surfaces
    cmds:
      - cmd: |
          set -eu
          ran=0

          if [ -n "{{.RUST_CRATES}}" ]; then
            echo "Building runnable Rust crates"
            for crate in {{.RUST_CRATES}}; do
              echo "  - $crate"
              (cd "$crate" && cargo build)
            done
            ran=1
          fi

          if [ -f "{{.PYTHON_ROOT}}/pyproject.toml" ]; then
            echo "Syncing Python submodule"
            (cd "{{.PYTHON_ROOT}}" && uv sync)
            ran=1
          elif grep -q 'path = {{.PYTHON_ROOT}}' .gitmodules 2>/dev/null; then
            echo "Skipping Python build: submodule {{.PYTHON_ROOT}} is not initialized"
          fi

          if [ -f "{{.TS_ROOT}}/package.json" ] && [ -f "{{.TS_ROOT}}/tsconfig.json" ]; then
            echo "Building TypeScript workspace"
            (cd "{{.TS_ROOT}}" && npm run build)
            ran=1
          elif [ -f "{{.TS_ROOT}}/package.json" ]; then
            echo "Skipping TypeScript build: scaffold detected without tsconfig.json"
          fi

          if [ -n "{{.GO_MODULES}}" ]; then
            echo "Building Go modules"
            for module in {{.GO_MODULES}}; do
              echo "  - $module"
              packages="$(cd "$module" && {{.GO_CMD}} list ./... | grep -v '/integrationtests/' | grep -v '/internal/watcher/testing$' | tr '\n' ' ' || true)"
              if [ -n "$packages" ]; then
                (cd "$module" && {{.GO_CMD}} build $packages)
              else
                echo "    no default Go packages detected"
              fi
            done
            ran=1
          elif [ -f "go/go.work" ]; then
            echo "Skipping Go build: scaffold detected without go.mod"
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No supported build target detected" >&2
            exit 1
          fi

  test:
    desc: Test detected language surfaces
    cmds:
      - cmd: |
          set -eu
          ran=0

          if [ -n "{{.RUST_CRATES}}" ]; then
            echo "Testing runnable Rust crates"
            for crate in {{.RUST_CRATES}}; do
              echo "  - $crate"
              (cd "$crate" && cargo test)
            done
            ran=1
          fi

          if [ -f "{{.PYTHON_ROOT}}/pyproject.toml" ]; then
            echo "Testing Python submodule"
            (cd "{{.PYTHON_ROOT}}" && uv run pytest)
            ran=1
          elif grep -q 'path = {{.PYTHON_ROOT}}' .gitmodules 2>/dev/null; then
            echo "Skipping Python tests: submodule {{.PYTHON_ROOT}} is not initialized"
          fi

          if [ -f "{{.TS_ROOT}}/package.json" ] && [ -f "{{.TS_ROOT}}/tsconfig.json" ]; then
            echo "Testing TypeScript workspace"
            (cd "{{.TS_ROOT}}" && npm test)
            ran=1
          elif [ -f "{{.TS_ROOT}}/package.json" ]; then
            echo "Skipping TypeScript tests: scaffold detected without tsconfig.json"
          fi

          if [ -n "{{.GO_MODULES}}" ]; then
            echo "Testing Go modules"
            for module in {{.GO_MODULES}}; do
              echo "  - $module"
              packages="$(cd "$module" && {{.GO_CMD}} list ./... | grep -v '/integrationtests/' | grep -v '/internal/watcher/testing$' | tr '\n' ' ' || true)"
              if [ -n "$packages" ]; then
                (cd "$module" && {{.GO_CMD}} test $packages)
              else
                echo "    no default Go packages detected"
              fi
            done
            ran=1
          elif [ -f "go/go.work" ]; then
            echo "Skipping Go tests: scaffold detected without go.mod"
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No supported test target detected" >&2
            exit 1
          fi

  lint:
    desc: Lint detected language surfaces
    cmds:
      - cmd: |
          set -eu
          ran=0

          if [ -n "{{.RUST_CRATES}}" ]; then
            echo "Linting runnable Rust crates"
            for crate in {{.RUST_CRATES}}; do
              echo "  - $crate"
              (
                cd "$crate" && \
                cargo fmt --check && \
                cargo clippy --all-targets --all-features -- -D warnings
              )
            done
            ran=1
          fi

          if [ -f "{{.PYTHON_ROOT}}/pyproject.toml" ]; then
            echo "Linting Python submodule"
            (cd "{{.PYTHON_ROOT}}" && uv run ruff check . && uv run black --check .)
            ran=1
          elif grep -q 'path = {{.PYTHON_ROOT}}' .gitmodules 2>/dev/null; then
            echo "Skipping Python lint: submodule {{.PYTHON_ROOT}} is not initialized"
          fi

          if [ -f "{{.TS_ROOT}}/package.json" ] && [ -f "{{.TS_ROOT}}/tsconfig.json" ]; then
            echo "Linting TypeScript workspace"
            (cd "{{.TS_ROOT}}" && npm run lint)
            ran=1
          elif [ -f "{{.TS_ROOT}}/package.json" ]; then
            echo "Skipping TypeScript lint: scaffold detected without tsconfig.json"
          fi

          if [ -n "{{.GO_MODULES}}" ]; then
            echo "Linting Go modules"
            for module in {{.GO_MODULES}}; do
              echo "  - $module"
              unformatted="$(cd "$module" && gofmt -l .)"
              if [ -n "$unformatted" ]; then
                echo "$unformatted" >&2
                exit 1
              fi
              packages="$(cd "$module" && {{.GO_CMD}} list ./... | grep -v '/integrationtests/' | grep -v '/internal/watcher/testing$' | tr '\n' ' ' || true)"
              if [ -n "$packages" ]; then
                (cd "$module" && {{.GO_CMD}} test $packages)
              else
                echo "    no default Go packages detected"
              fi
            done
            ran=1
          elif [ -f "go/go.work" ]; then
            echo "Skipping Go lint: scaffold detected without go.mod"
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No supported lint target detected" >&2
            exit 1
          fi

  clean:
    desc: Remove build artifacts for detected language surfaces
    cmds:
      - cmd: |
          set -eu
          ran=0

          if [ -n "{{.RUST_CRATES}}" ]; then
            echo "Cleaning runnable Rust crates"
            for crate in {{.RUST_CRATES}}; do
              echo "  - $crate"
              (cd "$crate" && cargo clean)
            done
            ran=1
          fi

          if [ -f "{{.PYTHON_ROOT}}/pyproject.toml" ]; then
            echo "Cleaning Python submodule artifacts"
            python -c 'from pathlib import Path; import shutil; root = Path("python/pheno-mcp"); targets = [root / ".pytest_cache", root / ".ruff_cache", root / ".mypy_cache", root / "build", root / "dist"]; [shutil.rmtree(path) if path.is_dir() else path.unlink() for path in targets if path.exists()]; [shutil.rmtree(path) for path in root.rglob("__pycache__") if path.is_dir()]; [path.unlink() for path in root.rglob("*.pyc") if path.exists()]'
            ran=1
          elif grep -q 'path = {{.PYTHON_ROOT}}' .gitmodules 2>/dev/null; then
            echo "Skipping Python clean: submodule {{.PYTHON_ROOT}} is not initialized"
          fi

          if [ -f "{{.TS_ROOT}}/package.json" ]; then
            echo "Cleaning TypeScript workspace artifacts"
            python -c 'from pathlib import Path; import shutil; root = Path("typescript"); targets = [root / "dist", root / "coverage", root / ".turbo"]; [shutil.rmtree(path) if path.is_dir() else path.unlink() for path in targets if path.exists()]'
            ran=1
          fi

          if [ -n "{{.GO_MODULES}}" ]; then
            echo "Cleaning Go modules"
            for module in {{.GO_MODULES}}; do
              echo "  - $module"
              (cd "$module" && {{.GO_CMD}} clean)
            done
            ran=1
          elif [ -f "go/go.work" ]; then
            echo "Skipping Go clean: scaffold detected without go.mod"
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No supported clean target detected" >&2
            exit 1
          fi
